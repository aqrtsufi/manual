name: Deploy AQRT Manual

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Update Diyanet calendar
        run: npm run calendar:update || echo "Using checked-in Diyanet calendar data"

      - name: Build AQRT Manual
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload website
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v5
